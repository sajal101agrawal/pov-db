services:
  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_DB: pov
      POSTGRES_USER: pov
      POSTGRES_PASSWORD: pov
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pov -d pov"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://pov:pov@postgres:5432/pov
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
