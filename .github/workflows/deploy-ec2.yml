name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      APP_DIR: ~/pov-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync code
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "mkdir -p $APP_DIR"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ "$EC2_USER@$EC2_HOST:$APP_DIR/"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cd $APP_DIR && bash scripts/deploy_prod.sh"
