name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_PORT: 22
      APP_DIR: /opt/pov-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          release="releases/${GITHUB_SHA}"
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$APP_DIR/$release' '$APP_DIR/shared'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            -e "ssh -i ~/.ssh/ec2_key -p $EC2_PORT" \
            ./ "$EC2_USER@$EC2_HOST:$APP_DIR/$release/"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" 'bash -s' <<EOF
          set -euo pipefail
          cd "$APP_DIR"
          test -f shared/.env
          ln -sfn "releases/${GITHUB_SHA}" current
          cp shared/.env current/.env
          cd current
          scripts/deploy_prod.sh
          cd "$APP_DIR"
          ls -dt releases/* | tail -n +6 | xargs -r rm -rf
          docker image prune -f
          EOF
